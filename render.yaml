services:
  - type: web
    name: mentall-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_PROJECT_ID
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: IA_MODEL_PROVIDER
        sync: false
      - key: IA_MODEL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: APP_PASSWORD_HASH
        sync: false
      - key: OPENALEX_MAILTO
        sync: false
      - key: OPENALEX_API_KEY
        sync: false
